<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Video Editor</title>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

video {
  width: 90%;
  margin-top: 10px;
  border-radius: 10px;
}

.controls {
  margin-top: 10px;
}

button, input {
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: orange;
  color: black;
}

</style>
</head>

<body>

<h2>🎬 Pro Video Editor</h2>

<input type="file" id="upload" accept="video/*"><br>

<video id="video" controls></video>

<div class="controls">

<!-- Filters -->
<button onclick="applyFilter('grayscale(1)')">B&W</button>
<button onclick="applyFilter('contrast(1.5)')">HDR</button>
<button onclick="applyFilter('brightness(1.3)')">Bright</button>
<button onclick="applyFilter('none')">Normal</button>

<br>

<!-- Speed -->
<button onclick="setSpeed(0.5)">Slow</button>
<button onclick="setSpeed(1)">Normal</button>
<button onclick="setSpeed(2)">Fast</button>

<br>

<!-- Trim -->
<label>Start:</label>
<input type="number" id="start" value="0">
<label>End:</label>
<input type="number" id="end" value="10">
<button onclick="trimVideo()">Trim</button>

</div>

<script>
let video = document.getElementById("video");

document.getElementById("upload").onchange = function(e) {
  let file = e.target.files[0];
  video.src = URL.createObjectURL(file);
};

function applyFilter(filter) {
  video.style.filter = filter;
}

function setSpeed(speed) {
  video.playbackRate = speed;
}

function trimVideo() {
  let start = document.getElementById("start").value;
  video.currentTime = start;
}
</script>

</body>
</html>
